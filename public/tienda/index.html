<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda - El Guía Ya</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;background:#0b1628;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
    .icon{font-size:4rem;color:#10b981;margin-bottom:20px}
    h1{font-size:2rem;font-weight:800;margin-bottom:8px}
    h1 span{color:#10b981}
    p{color:#64748b;max-width:420px;line-height:1.6;margin-bottom:28px;font-size:.95rem}
    .btn{display:inline-block;padding:16px 40px;border-radius:14px;background:#10b981;color:#fff;font-weight:700;font-size:1.05rem;text-decoration:none;transition:all .2s;box-shadow:0 8px 24px -4px rgba(16,185,129,.3)}
    .btn:hover{background:#059669;transform:translateY(-2px);box-shadow:0 12px 32px -6px rgba(16,185,129,.4)}
    .btn i{margin-right:8px}
    .back{display:inline-block;margin-top:20px;color:#475569;text-decoration:none;font-size:.85rem;transition:color .2s}
    .back:hover{color:#10b981}
    @media(max-width:640px){h1{font-size:1.5rem}.icon{font-size:3rem}}
  </style>
</head>
<body>
  <div class="icon"><i class="fas fa-store"></i></div>
  <h1>El Guía <span>Ya</span> · Tienda</h1>
  <p>Accedé a la tienda completa con todos los productos, categorías, carruseles, blog, carrito de compras y más. Todo lo que manejás desde el administrador.</p>
  <a class="btn" href="https://app.elguiaya.com/tienda" target="_blank"><i class="fas fa-external-link-alt"></i> Ir a la tienda</a>
  <a class="back" href="/"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
</body>
</html>
